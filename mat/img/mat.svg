<svg id="mat-svg" width="320" height="320" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
        </linearGradient>
        <filter id="softShadow" x="-20%" y="-20%" width="150%" height="150%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="8" />
            <feOffset dx="0" dy="10" result="offsetblur" />
            <feComponentTransfer><feFuncA type="linear" slope="0.2" /></feComponentTransfer>
            <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>

        <!-- SZABLONY EMOCJI -->
        <g id="template-neutral">
            <path class="t-brow-l" d="M 145 155 Q 165 150 185 155" />
            <path class="t-brow-r" d="M 215 155 Q 235 150 255 155" />
            <path class="t-mouth-top" d="M 165 225 Q 200 240 235 225" />
            <path class="t-mouth-bottom" d="M 165 225 Q 200 240 235 225" />
            <path class="t-mouth-fill" d="M 165 225 Q 200 240 235 225 Q 200 240 165 225 Z" />
            <circle class="t-pupil-l" r="11" />
            <circle class="t-pupil-r" r="11" />
            <g class="t-meta" data-fill-opacity="0"></g>
        </g>

        <g id="template-thinking">
            <path class="t-brow-l" d="M 145 145 Q 165 155 185 150" />
            <path class="t-brow-r" d="M 215 150 Q 235 140 255 145" />
            <path class="t-mouth-top" d="M 179 232 Q 190 224 201 232" />
            <path class="t-mouth-bottom" d="M 179 232 Q 190 240 201 232" />
            <path class="t-mouth-fill" d="M 179 232 Q 190 224 201 232 Q 190 240 179 232 Z" />
            <circle class="t-pupil-l" r="11" />
            <circle class="t-pupil-r" r="11" />
            <g class="t-meta" data-fill-opacity="0"></g>
        </g>

        <g id="template-sad">
            <path class="t-brow-l" d="M 140 161 Q 170 141 180 156" />
            <path class="t-brow-r" d="M 220 156 Q 230 141 260 161" />
            <path class="t-mouth-top" d="M 165 245 Q 200 220 235 245" />
            <path class="t-mouth-bottom" d="M 165 245 Q 200 220 235 245" />
            <path class="t-mouth-fill" d="M 165 245 Q 200 220 235 245 Q 200 220 165 245 Z" />
            <circle class="t-pupil-l" r="11" />
            <circle class="t-pupil-r" r="11" />
            <g class="t-meta" data-fill-opacity="0"></g>
        </g>

        <g id="template-happy">
            <path class="t-brow-l" d="M 140 151 Q 160 141 180 151" />
            <path class="t-brow-r" d="M 220 151 Q 240 141 260 151" />
            <path class="t-mouth-top" d="M 165 220 Q 200 230 235 220" />
            <path class="t-mouth-bottom" d="M 165 220 Q 200 270 235 220" />
            <path class="t-mouth-fill" d="M 165 220 Q 200 230 235 220 Q 200 270 165 220 Z" />
            <circle class="t-pupil-l" r="14" />
            <circle class="t-pupil-r" r="14" />
            <g class="t-meta" data-fill-opacity="1"></g>
        </g>
    </defs>
    
    <g id="full-logo-container">
        <circle cx="200" cy="200" r="190" fill="url(#mainGrad)" />
        <g id="mat-hero" filter="url(#softShadow)">
            <path d="M 190 40 C 162.3 40 140 62.3 140 90 L 140 140 L 90 140 C 62.3 140 40 162.3 40 190 L 40 210 C 40 237.7 62.3 260 90 260 L 140 260 L 140 310 C 140 337.7 162.3 360 190 360 L 210 360 C 237.7 360 260 337.7 260 310 L 260 260 L 310 260 C 337.7 260 360 237.7 360 210 L 360 190 C 360 162.3 337.7 140 310 140 L 260 140 L 260 90 C 260 62.3 237.7 40 210 40 L 190 40 z" 
                  fill="#4CAF50" 
                  stroke="#2E7D32" 
                  stroke-width="8" 
                  stroke-linejoin="round" />
            <g id="face-active" transform="translate(0, 9)">
                <path id="brow-l" d="M 145 155 Q 165 150 185 155" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
                <path id="brow-r" d="M 215 155 Q 235 150 255 155" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
                <g id="eyes">
                    <circle cx="165" cy="180" r="21" fill="white" />
                    <circle id="pupil-l" cx="165" cy="180" r="11" fill="black" />
                    <circle cx="170" cy="174" r="6" fill="white" opacity="0.9" />
                    <circle cx="235" cy="180" r="21" fill="white" />
                    <circle id="pupil-r" cx="235" cy="180" r="11" fill="black" />
                    <circle cx="240" cy="174" r="6" fill="white" opacity="0.9" />
                </g>
                <path id="mouth-fill" d="M 165 225 Q 200 240 235 225 Q 200 240 165 225 Z" fill="#E8F5E9" opacity="0" />
                <path id="mouth-top" d="M 165 225 Q 200 240 235 225" stroke="white" stroke-width="9" fill="none" stroke-linecap="round" />
                <path id="mouth-bottom" d="M 165 225 Q 200 240 235 225" stroke="white" stroke-width="9" fill="none" stroke-linecap="round" />
            </g>
        </g>
    </g>
</svg>
